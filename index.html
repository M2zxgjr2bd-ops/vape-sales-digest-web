<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电子烟销售情报日报</title>
    <style>
      :root {
        --bg: #f4efe5;
        --paper: rgba(255, 252, 246, 0.86);
        --ink: #18201d;
        --muted: #5d665f;
        --line: rgba(24, 32, 29, 0.12);
        --accent: #0f766e;
        --shadow: 0 24px 60px rgba(20, 26, 24, 0.12);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(180, 83, 9, 0.16), transparent 24rem),
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 22rem),
          linear-gradient(180deg, #fcf7ef 0%, #efe6d7 100%);
        min-height: 100vh;
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .panel,
      .section-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero-main {
        padding: 28px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.09);
        color: var(--accent);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.94;
        font-weight: 700;
      }

      .hero-copy {
        margin: 0;
        max-width: 54ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 20px;
        font: 600 14px/1 "Avenir Next", "Helvetica Neue", sans-serif;
        cursor: pointer;
      }

      .primary {
        background: var(--ink);
        color: #fff;
      }

      .secondary {
        background: rgba(24, 32, 29, 0.08);
        color: var(--ink);
      }

      .hero-side {
        padding: 24px;
        display: grid;
        gap: 14px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(24, 32, 29, 0.08);
      }

      .stat-label {
        margin: 0 0 6px;
        font: 600 12px/1.3 "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .stat-value {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
      }

      .meta-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .meta-pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(24, 32, 29, 0.1);
        font: 500 13px/1.2 "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--muted);
      }

      .status {
        margin-bottom: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(15, 118, 110, 0.08);
        border: 1px solid rgba(15, 118, 110, 0.12);
        color: var(--ink);
        font: 500 14px/1.5 "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .section-card {
        padding: 22px;
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      .section-content {
        white-space: pre-wrap;
        color: var(--muted);
        line-height: 1.74;
        font-size: 0.98rem;
      }

      .footer-note {
        margin-top: 20px;
        color: var(--muted);
        font: 500 13px/1.6 "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .error {
        background: rgba(180, 83, 9, 0.08);
        border-color: rgba(180, 83, 9, 0.16);
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100% - 20px, 1120px);
          padding-top: 16px;
        }

        .hero-main,
        .hero-side,
        .section-card {
          padding: 18px;
          border-radius: 20px;
        }

        .stat-grid {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <article class="panel hero-main">
          <div class="eyebrow">OUKITEL VAPEIN Digest</div>
          <h1>电子烟行业销售情报日报</h1>
          <p class="hero-copy">
            这个版本不需要购买域名，也不需要先接邮件服务。部署到 Vercel 后，直接通过
            <code>*.vercel.app</code> 打开，就能查看当天的销售情报日报。
          </p>
          <div class="actions">
            <button class="primary" id="load-report">加载今日日报</button>
            <button class="secondary" id="refresh-report">重新抓取今日信息</button>
          </div>
        </article>

        <aside class="panel hero-side">
          <div class="stat-grid">
            <div class="stat">
              <p class="stat-label">日期</p>
              <p class="stat-value" id="stat-date">--</p>
            </div>
            <div class="stat">
              <p class="stat-label">条目数</p>
              <p class="stat-value" id="stat-count">--</p>
            </div>
            <div class="stat">
              <p class="stat-label">生成模式</p>
              <p class="stat-value" id="stat-mode">--</p>
            </div>
            <div class="stat">
              <p class="stat-label">缓存状态</p>
              <p class="stat-value" id="stat-cache">--</p>
            </div>
          </div>
          <div class="footer-note">
            先把网页版本跑通，确认内容对你有用。以后如果你又想恢复自动发邮箱，再把邮件链路加回去就行。
          </div>
        </aside>
      </section>

      <div class="meta-strip">
        <div class="meta-pill" id="meta-generated">生成时间：--</div>
        <div class="meta-pill" id="meta-subject">标题：--</div>
        <div class="meta-pill" id="meta-sources">来源：--</div>
      </div>

      <div class="status" id="status-box">点“加载今日日报”开始抓取。</div>

      <section class="grid" id="report-sections"></section>
    </main>

    <script>
      const statusBox = document.getElementById("status-box");
      const reportSections = document.getElementById("report-sections");

      const statDate = document.getElementById("stat-date");
      const statCount = document.getElementById("stat-count");
      const statMode = document.getElementById("stat-mode");
      const statCache = document.getElementById("stat-cache");
      const metaGenerated = document.getElementById("meta-generated");
      const metaSubject = document.getElementById("meta-subject");
      const metaSources = document.getElementById("meta-sources");

      let loading = false;

      function setStatus(message, kind = "info") {
        statusBox.textContent = message;
        statusBox.classList.toggle("error", kind === "error");
      }

      function sourceSummary(sourceBreakdown) {
        return [
          `监管 ${sourceBreakdown.regulatory ?? 0}`,
          `媒体 ${sourceBreakdown.media ?? 0}`,
          `品牌 ${sourceBreakdown.brand ?? 0}`,
          `线索 ${sourceBreakdown.lead ?? 0}`
        ].join(" / ");
      }

      function renderSections(sections) {
        reportSections.innerHTML = "";

        sections.forEach((section) => {
          const article = document.createElement("article");
          article.className = "section-card";

          const title = document.createElement("h2");
          title.className = "section-title";
          title.textContent = section.title;

          const content = document.createElement("div");
          content.className = "section-content";
          content.textContent = section.content;

          article.appendChild(title);
          article.appendChild(content);
          reportSections.appendChild(article);
        });
      }

      async function loadReport(force = false) {
        if (loading) return;
        loading = true;
        setStatus(force ? "正在重新抓取今日信息，这一步可能要几十秒。" : "正在加载今日日报。");

        try {
          const response = await fetch(`/api/report/latest${force ? "?force=1" : ""}`, {
            cache: "no-store"
          });
          const data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.error || "加载失败");
          }

          statDate.textContent = data.dateKey || "--";
          statCount.textContent = String(data.itemCount ?? "--");
          statMode.textContent = data.generationMode || "--";
          statCache.textContent = data.cached ? "缓存" : "新生成";

          metaGenerated.textContent = `生成时间：${data.generatedAt || "--"}`;
          metaSubject.textContent = `标题：${data.subject || "--"}`;
          metaSources.textContent = `来源：${sourceSummary(data.sourceBreakdown || {})}`;

          renderSections(data.sections || []);
          setStatus(data.cached ? "已加载今天的缓存日报。" : "已生成今天的最新日报。");
        } catch (error) {
          setStatus(error instanceof Error ? error.message : "加载失败", "error");
        } finally {
          loading = false;
        }
      }

      document.getElementById("load-report").addEventListener("click", () => loadReport(false));
      document.getElementById("refresh-report").addEventListener("click", () => loadReport(true));
      loadReport(false);
    </script>
  </body>
</html>
